<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>게임 가이드</title>
<style>
  :root{--panel:#0a1628;--panel2:#0f2740;--edge:#2a5a8a;--ink:#e8f4fd;--mut:#9fc0d4;--teal:#7fe0b0;--amber:#ffce54;--red:#e23a2a;--sky:#bfe4f8;}
  *{box-sizing:border-box;font-family:"Noto Sans KR","Segoe UI",sans-serif;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(#e8945a 0%,#b56a55 12%,#3a5a72 26%,#12314a 55%,#0a2033 100%);}
  .modal{width:740px;max-width:96vw;background:var(--panel);border:2px solid var(--edge);border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);overflow:hidden;}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--panel2);border-bottom:1px solid var(--edge);}
  .bar h1{margin:0;font-size:16px;color:var(--ink);}
  .bar .x{cursor:pointer;color:var(--mut);font-size:16px;border:1px solid var(--edge);border-radius:6px;width:26px;height:26px;display:grid;place-items:center;}
  .tabs{display:flex;gap:6px;padding:10px 16px 0;flex-wrap:wrap;background:var(--panel2);}
  .tab{cursor:pointer;padding:7px 14px;border-radius:8px 8px 0 0;font-size:13px;color:var(--mut);background:#0c2036;border:1px solid var(--edge);border-bottom:none;}
  .tab.on{color:#0b1620;background:var(--amber);font-weight:700;}
  .stage{padding:16px 18px 6px;}
  .art{background:#0c1e30;border:1px solid #1c3d5a;border-radius:8px;overflow:hidden;}
  .art svg{display:block;width:100%;height:auto;}
  .cap{padding:12px 4px 6px;} .cap h2{margin:0 0 6px;font-size:15px;color:var(--teal);}
  .cap p{margin:0;font-size:13px;line-height:1.6;color:var(--ink);} .cap .tip{color:var(--mut);font-size:12px;margin-top:6px;}
  .foot{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--panel2);border-top:1px solid var(--edge);}
  .dots{display:flex;gap:7px;} .dot{width:9px;height:9px;border-radius:50%;background:#2a4a63;cursor:pointer;} .dot.on{background:var(--amber);}
  .nav{display:flex;gap:8px;} .btn{cursor:pointer;border:1px solid var(--edge);background:#153050;color:var(--ink);border-radius:7px;padding:7px 14px;font-size:13px;}
  .btn:hover{background:#1c3d5a;} .btn[disabled]{opacity:.35;cursor:default;}
  .hint{position:fixed;right:16px;bottom:16px;color:var(--ink);font-size:12px;background:rgba(10,22,34,.9);border:1px solid var(--edge);border-radius:8px;padding:8px 12px;}
  .qbtn{width:24px;height:24px;border-radius:7px;border:1px solid var(--edge);background:#153050;color:var(--sky);display:inline-grid;place-items:center;font-weight:700;cursor:pointer;vertical-align:middle;}
</style></head>
<body>
<div class="modal" id="modal">
  <div class="bar"><h1>📖 게임 가이드</h1><div class="x" onclick="hide()">✕</div></div>
  <div class="tabs" id="tabs"></div>
  <div class="stage"><div class="art" id="art"></div><div class="cap" id="cap"></div></div>
  <div class="foot"><div class="dots" id="dots"></div><div class="nav"><button class="btn" id="prev" onclick="go(-1)">◀ 이전</button><button class="btn" id="next" onclick="go(1)">다음 ▶</button></div></div>
</div>
<div class="hint">우측 <span class="qbtn" onclick="show()">?</span> 가이드 버튼으로 언제든 다시보기</div>
<script>
const bg="<rect width='640' height='300' fill='#0c1e30'/>";
const wl="<line x1='0' y1='70' x2='640' y2='70' stroke='#eaf4ee' stroke-width='2' opacity='.7'/>";
const GUIDES = {
 "파이트":[
  {h:"챔질 타이밍",p:"입질하면 초릿대가 <b>3단계</b>로 휘어요. 크게 휜 <b>3단계에서 우클릭 챔질</b>이 성공률 100% (1단계 5% · 2단계 20%).",tip:"약은 입질엔 1초 릴링/뒷줄견제(H)로 3단계를 유도.",
   svg:bg+"<text x='40' y='40' fill='#9fc0d4' font-size='12'>초릿대 휨 단계</text>"+
   "<path d='M120,250 C 140,150 180,110 220,120' stroke='#16161a' stroke-width='6' fill='none'/><text x='150' y='140' fill='#7fe0b0' font-size='12'>1단계 5%</text>"+
   "<path d='M320,250 C 330,140 360,90 420,110' stroke='#16161a' stroke-width='6' fill='none'/><text x='350' y='104' fill='#ffce54' font-size='12'>2단계 20%</text>"+

  {h:"텐션 & 드랙",p:"텐션바가 <b>초록→주황→빨강</b>. <b>90%에서 릴이 잠기니</b> 드랙을 풀어요(<b>↑/↓</b> 또는 F/G). 드랙은 줄 강도의 약 1/3이 기본.",tip:"빨강에서 무리하면 줄 터짐. 풀고 버티다 잦아들 때 감기.",
   svg:bg+"<rect x='60' y='120' width='520' height='26' rx='6' fill='#12324a'/>"+
   "<rect x='60' y='120' width='210' height='26' rx='6' fill='#33cc66'/><rect x='270' y='120' width='170' height='26' fill='#ffaa33'/><rect x='440' y='120' width='120' height='26' fill='#ff3b3b'/>"+
   "<text x='60' y='110' fill='#9ad0b8' font-size='12'>텐션</text><text x='470' y='176' fill='#ff9a9a' font-size='12'>90% 락업 → 드랙 풀기(↓)</text>"+
   "<text x='120' y='210' fill='#cfe6da' font-size='12'>안전</text><text x='320' y='210' fill='#ffcf8a' font-size='12'>경고</text>"},
  {h:"횡 러닝 — 로드 스티어",p:"물고기가 <b>좌/우로 째면 그쪽으로 로드를 눕혀</b>(←/→) 버텨요. 텐션이 잦아든 틈에 <b>반대로 눌러</b> 머리를 돌리면 제압이 진행돼요.",tip:"러닝엔 같이 눕혀 버티고, 잠잠할 때 반대로 뺏기.",
   svg:bg+wl+"<g transform='translate(240,180) rotate(210)'><ellipse rx='26' ry='11' fill='#2a4d55' stroke='#7fb0d0' stroke-width='1.6'/><path d='M22,0 L38,-8 L38,8 Z' fill='#20343a'/><circle cx='-18' cy='-2' r='2.6' fill='#eaf4ee'/></g>"+
   "<line x1='240' y1='180' x2='150' y2='150' stroke='#ff8a6a' stroke-width='2.4'/><text x='120' y='140' fill='#ffb59a' font-size='12'>좌로 째면</text>"+

  {h:"피로 구간",p:"파이트는 <b>러닝→소강→파상저항→제압</b> 순으로 힘이 빠져요. <b>슬랙(줄 늦춤)을 주면 회복</b>하니 긴장을 유지해요. 대물일수록 오래 버팁니다.",tip:"소강 구간에 펌핑으로 줄을 벌어요.",

  {h:"제압 & 랜딩",p:"지치면 물고기가 <b>수면으로 부상</b>하며 <b>화면 앞으로 끌려와</b> 커져요. 이때 뜰채로 랜딩 → 어획!",tip:"제압 근접엔 머리가 반대여도 몸이 딸려와요.",

 ],
 "회수":[

   "<line x1='0' y1='236' x2='640' y2='236' stroke='#7fe0b0' stroke-width='1' stroke-dasharray='5 4' opacity='.6'/><text x='470' y='230' fill='#7fe0b0' font-size='11'>도달 ≈중앙~하단중간</text>"},
  {h:"채비/루어 세트",p:"<b>찌 채비</b>는 찌까지 함께 딸려오고, <b>루어</b>는 찌 없이 채비만 와요. 초릿대에서 이어진 <b>원줄도 세트를 따라</b> 함께 딸려옵니다.",tip:"세트 전체가 한 덩어리로 움직여요.",

  {h:"회수 중 조작",p:"<b>H 뒷줄견제</b>(그 지점에 채비 홀드) · <b>↑ 리프트</b>(채비를 위로) · <b>↓ 폴링</b>(가라앉히며 대기). 조류·수심에 맞춰 채비를 다뤄요.",tip:"뒷줄견제는 속조류 정렬만 영향받는 홀드예요.",

 ],
 "밑밥":[

  {h:"동조율 읽고 조준",p:"투척점을 고르면 <b>예측 흐름(고스트)</b>이 보여요. HUD <b>밑밥 동조 %</b>가 차오를 때가 찬스! 조류·수심에 맞춰 조절.",tip:"동조 낮으면 한 칸 상류로, 침강 느리면 무거운 밑밥.",

const CATS = Object.keys(GUIDES);
let cat = CATS[0], i = 0;
const tabsEl=document.getElementById('tabs'),art=document.getElementById('art'),cap=document.getElementById('cap'),dots=document.getElementById('dots');
function renderTabs(){ tabsEl.innerHTML=CATS.map(c=>`<div class="tab ${c===cat?'on':''}" onclick="setCat('${c}')">${c}</div>`).join(''); }
function render(){
  const pg=GUIDES[cat][i];
  art.innerHTML=`<svg viewBox='0 0 640 300'>${pg.svg}</svg>`;
  cap.innerHTML=`<h2>${i+1}. ${pg.h}</h2><p>${pg.p}</p><div class="tip">💡 ${pg.tip}</div>`;
  dots.innerHTML=GUIDES[cat].map((_,k)=>`<span class="dot ${k===i?'on':''}" onclick="jump(${k})"></span>`).join('');
  document.getElementById('prev').disabled=(i===0); document.getElementById('next').disabled=(i===GUIDES[cat].length-1);
}
function setCat(c){ cat=c; i=0; renderTabs(); render(); }
function go(d){ i=Math.min(GUIDES[cat].length-1,Math.max(0,i+d)); render(); }
function jump(k){ i=k; render(); }
function hide(){ document.getElementById('modal').style.display='none'; }
function show(){ document.getElementById('modal').style.display='block'; render(); }
renderTabs(); render();
</script>
