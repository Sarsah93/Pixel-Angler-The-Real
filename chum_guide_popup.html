<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>밑밥 운용 가이드</title>
<style>
  :root{ --panel:#0a1628; --panel2:#0f2740; --edge:#2a5a8a; --ink:#e8f4fd; --mut:#9fc0d4;
         --teal:#7fe0b0; --amber:#ffce54; --red:#e23a2a; --sky:#bfe4f8; }
  *{box-sizing:border-box; font-family:"Noto Sans KR","Segoe UI",sans-serif;}
  body{margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(#e8945a 0%, #b56a55 12%, #3a5a72 26%, #12314a 55%, #0a2033 100%);}
  /* 팝업 */
  .modal{width:720px; max-width:96vw; background:var(--panel); border:2px solid var(--edge);
    border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.55); overflow:hidden;}
  .bar{display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    background:var(--panel2); border-bottom:1px solid var(--edge);}
  .bar h1{margin:0; font-size:17px; color:var(--ink); letter-spacing:.3px;}
  .bar .x{cursor:pointer; color:var(--mut); font-size:18px; border:1px solid var(--edge);
    border-radius:6px; width:28px; height:28px; display:grid; place-items:center;}
  .stage{padding:16px 18px 6px;}
  .art{background:#0c1e30; border:1px solid #1c3d5a; border-radius:8px; overflow:hidden;}
  .art svg{display:block; width:100%; height:auto;}
  .cap{padding:12px 4px 6px;}
  .cap h2{margin:0 0 6px; font-size:15px; color:var(--teal);}
  .cap p{margin:0; font-size:13px; line-height:1.6; color:var(--ink);}
  .cap .tip{color:var(--mut); font-size:12px; margin-top:6px;}
  /* 푸터 */
  .foot{display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    background:var(--panel2); border-top:1px solid var(--edge);}
  .dots{display:flex; gap:7px;}
  .dot{width:9px; height:9px; border-radius:50%; background:#2a4a63; cursor:pointer;}
  .dot.on{background:var(--amber);}
  .nav{display:flex; gap:8px;}
  .btn{cursor:pointer; border:1px solid var(--edge); background:#153050; color:var(--ink);
    border-radius:7px; padding:7px 14px; font-size:13px;}
  .btn:hover{background:#1c3d5a;} .btn[disabled]{opacity:.35; cursor:default;}
  .hint{position:fixed; right:16px; bottom:16px; display:flex; align-items:center; gap:8px;
    color:var(--ink); font-size:12px; background:rgba(10,22,34,.9); border:1px solid var(--edge);
    border-radius:8px; padding:8px 12px;}
  .qbtn{width:26px; height:26px; border-radius:7px; border:1px solid var(--edge); background:#153050;
    color:var(--sky); display:grid; place-items:center; font-weight:700; cursor:pointer;}
</style>
</head>
<body>
  <div class="modal" id="modal">
    <div class="bar"><h1>🪣 밑밥 운용 가이드</h1><div class="x" onclick="hide()">✕</div></div>
    <div class="stage"><div class="art" id="art"></div><div class="cap" id="cap"></div></div>
    <div class="foot">
      <div class="dots" id="dots"></div>
      <div class="nav">
        <button class="btn" id="prev" onclick="go(-1)">◀ 이전</button>
        <button class="btn" id="next" onclick="go(1)">다음 ▶</button>
      </div>
    </div>
  </div>
  <div class="hint">우측 <span class="qbtn" onclick="show()">?</span> 가이드 버튼으로 언제든 다시보기</div>

<script>
const PAGES = [
{ h:"밑밥이란?", p:"밑밥은 어군을 모으고 <b>미끼와 겹치게 흘려</b> 입질을 만드는 미끼용 떡밥이에요. 밑밥 구름과 미끼가 만나는 타이밍이 핵심입니다.",
  tip:"HUD의 '밑밥 동조 %'가 겹칠수록 올라가고, 입질 확률에 곱해져요.",
  svg:`<svg viewBox='0 0 640 300'>
    <rect width='640' height='300' fill='#0c1e30'/>
    <line x1='0' y1='70' x2='640' y2='70' stroke='#eaf4ee' stroke-width='2' opacity='.7'/>
    <text x='16' y='58' fill='#9fc0d4' font-size='12'>수면</text>
    <!-- chum cloud -->
    <circle cx='300' cy='120' r='10' fill='#e8c060' opacity='.9'/>
    <circle cx='330' cy='150' r='16' fill='#e8c060' opacity='.5'/>
    <circle cx='360' cy='185' r='22' fill='#e8c060' opacity='.32'/>
    <text x='250' y='128' fill='#e8d090' font-size='12'>밑밥 구름</text>
    <!-- bait -->
    <line x1='300' y1='72' x2='360' y2='200' stroke='#9fd0e4' stroke-width='1.4' opacity='.5'/>
    <circle cx='360' cy='205' r='6' fill='#ffb46a' stroke='#333'/>
    <text x='372' y='210' fill='#cfe6da' font-size='12'>미끼</text>
    <!-- fish gathering -->
    <g fill='#2a4d55' stroke='#7fb0d0' stroke-width='1.5'>
      <g transform='translate(470,150) rotate(200)'><ellipse rx='20' ry='9'/><path d='M16,0 L30,-7 L30,7 Z'/></g>
      <g transform='translate(430,235) rotate(160)'><ellipse rx='18' ry='8'/><path d='M14,0 L26,-6 L26,6 Z'/></g>
      <g transform='translate(500,205) rotate(210)'><ellipse rx='16' ry='7'/><path d='M13,0 L24,-5 L24,5 Z'/></g>
    </g>
    <text x='452' y='120' fill='#a8d0e0' font-size='12'>어군이 모여듦</text>
  </svg>`},
{ h:"투척 방법", p:"마우스 <b>좌우 위치</b>로 투척점을 고르고 <b>C</b>로 던져요. 수면에 <b>중앙 1 + 좌우 5~6개</b> 투척점이 있고, 커서에 가장 가까운 점으로 스냅됩니다.",
  tip:"커서 높낮이(위아래)는 무시 — 좌우만 정하면 돼요.",
  svg:`<svg viewBox='0 0 640 300'>
    <rect width='640' height='300' fill='#0c1e30'/>
    <line x1='0' y1='150' x2='640' y2='150' stroke='#eaf4ee' stroke-width='2' opacity='.7'/>
    <g fill='#e23a2a'>
      <circle cx='120' cy='150' r='7'/><circle cx='190' cy='150' r='7'/><circle cx='260' cy='150' r='7'/>
      <circle cx='330' cy='150' r='8'/>
      <circle cx='400' cy='150' r='7'/><circle cx='470' cy='150' r='7'/><circle cx='540' cy='150' r='7'/>
    </g>
    <text x='300' y='132' fill='#c98a8a' font-size='11'>중앙</text>
    <!-- cursor highlight -->
    <circle cx='400' cy='150' r='13' fill='none' stroke='#ffce54' stroke-width='3'/>
    <path d='M400,196 l-7,20 l14,0 Z' fill='#ffce54'/>
    <text x='360' y='236' fill='#ffe08a' font-size='12'>커서 최근접 → 여기 투척 (C)</text>
    <text x='150' y='210' fill='#9fc0d4' font-size='12'>좌우로 분포한 투척점</text>
  </svg>`},
{ h:"핵심 — 조류 상류로 리드", p:"밑밥은 조류를 따라 흘러가요. 그래서 <b>조류 상류에 던져</b> 밑밥이 미끼 쪽으로 흘러오게 해야 해요. <b>좌측 조류면 우측</b>에 던지면 왼쪽·아래로 흘러 미끼와 만납니다.",
  tip:"밑밥이 미끼 위치를 지나는 순간 동조율이 최대가 돼요.",
  svg:`<svg viewBox='0 0 640 300'>
    <rect width='640' height='300' fill='#0c1e30'/>
    <line x1='0' y1='60' x2='640' y2='60' stroke='#eaf4ee' stroke-width='2' opacity='.7'/>
    <!-- current left -->
    <line x1='470' y1='95' x2='330' y2='103' stroke='#bfe4f8' stroke-width='2.4' stroke-dasharray='6 5'/>
    <path d='M330,103 l14,-5 l-2,10 Z' fill='#bfe4f8'/>
    <text x='380' y='88' fill='#bfe4f8' font-size='12'>조류 ← (좌)</text>
    <!-- throw right -->
    <circle cx='430' cy='60' r='8' fill='#e23a2a'/><text x='412' y='44' fill='#ffe08a' font-size='11'>투척(우측)</text>
    <!-- drift path -->
    <path d='M430,66 C 390,130 320,190 260,232' stroke='#ffce54' stroke-width='2.4' stroke-dasharray='4 4' fill='none'/>
    <path d='M260,232 l16,-2 l-8,-13 Z' fill='#ffce54'/>
    <circle cx='430' cy='72' r='6' fill='#e8c060'/><circle cx='350' cy='150' r='10' fill='#e8c060' opacity='.5'/>
    <!-- bait + star -->
    <line x1='250' y1='66' x2='250' y2='230' stroke='#9fd0e4' stroke-width='1.2' opacity='.5'/>
    <circle cx='250' cy='232' r='6' fill='#ffb46a' stroke='#333'/><text x='196' y='250' fill='#cfe6da' font-size='12'>미끼</text>
    <g transform='translate(258,232)'><path d='M0,-13 L4,-4 L14,-4 L6,3 L9,13 L0,7 L-9,13 L-6,3 L-14,-4 L-4,-4 Z' fill='#7fe0b0'/></g>
    <text x='276' y='222' fill='#7fe0b0' font-size='12'>동조율 최대!</text>
  </svg>`},
{ h:"밑밥 종류별 침강", p:"밑밥마다 <b>가라앉는 속도·퍼짐·조류 타는 정도</b>가 달라요. <b>강조류엔 무거운 경단</b>(빠르고 정밀), <b>약조류엔 파우더</b>(느리고 넓게)로 상황에 맞춰 골라요.",
  tip:"압맥·보리는 그 중간의 범용 밑밥이에요.",
  svg:`<svg viewBox='0 0 640 300'>
    <rect width='640' height='300' fill='#0c1e30'/>
    <line x1='0' y1='54' x2='640' y2='54' stroke='#eaf4ee' stroke-width='2' opacity='.6'/>
    <!-- powder -->
    <g><text x='110' y='40' fill='#7fe0b0' font-size='13' text-anchor='middle'>파우더</text>
      <circle cx='110' cy='90' r='7' fill='#e8c060' opacity='.9'/><circle cx='96' cy='140' r='16' fill='#e8c060' opacity='.4'/><circle cx='120' cy='195' r='26' fill='#e8c060' opacity='.22'/>
      <line x1='110' y1='64' x2='110' y2='240' stroke='#ffce54' stroke-width='1.6' stroke-dasharray='3 6'/>
      <text x='110' y='268' fill='#cfe6da' font-size='11' text-anchor='middle'>느림·넓음·조류↑</text></g>
    <!-- grain -->
    <g><text x='320' y='40' fill='#7fe0b0' font-size='13' text-anchor='middle'>압맥/보리</text>
      <circle cx='320' cy='90' r='7' fill='#c8a86a'/><circle cx='312' cy='150' r='12' fill='#c8a86a' opacity='.5'/><circle cx='326' cy='205' r='17' fill='#c8a86a' opacity='.3'/>
      <line x1='320' y1='64' x2='320' y2='245' stroke='#ffce54' stroke-width='2' stroke-dasharray='4 4'/>
      <text x='320' y='268' fill='#cfe6da' font-size='11' text-anchor='middle'>중간(범용)</text></g>
    <!-- ball -->
    <g><text x='530' y='40' fill='#7fe0b0' font-size='13' text-anchor='middle'>무거운 경단</text>
      <circle cx='530' cy='90' r='8' fill='#a88a4a'/><circle cx='528' cy='160' r='8' fill='#a88a4a' opacity='.7'/><circle cx='530' cy='225' r='9' fill='#a88a4a' opacity='.5'/>
      <line x1='530' y1='64' x2='530' y2='250' stroke='#ffce54' stroke-width='3'/>
      <path d='M530,250 l-4,-12 l8,0 Z' fill='#ffce54'/>
      <text x='530' y='272' fill='#cfe6da' font-size='11' text-anchor='middle'>빠름·좁음·정밀</text></g>
  </svg>`},
{ h:"동조율 읽고 조준", p:"투척점을 고르면 <b>예측 흐름(고스트)</b>이 미리 보여요. 그걸로 조준하고, HUD <b>밑밥 동조 %</b>가 차오를 때가 입질 찬스예요. 조류·수심에 맞춰 투척점을 조절하세요.",
  tip:"동조가 낮으면 한 칸 상류로, 침강이 느리면 무거운 밑밥으로.",
  svg:`<svg viewBox='0 0 640 300'>
    <rect width='640' height='300' fill='#0c1e30'/>
    <line x1='0' y1='60' x2='640' y2='60' stroke='#eaf4ee' stroke-width='2' opacity='.7'/>
    <circle cx='430' cy='60' r='8' fill='#e23a2a'/>
    <path d='M430,66 C 390,130 330,185 275,222' stroke='#7fa9c4' stroke-width='2' stroke-dasharray='2 5' fill='none'/>
    <text x='300' y='120' fill='#9fc0d4' font-size='11' transform='rotate(48 300 120)'>예측 흐름(고스트)</text>
    <circle cx='268' cy='226' r='6' fill='#ffb46a' stroke='#333'/><text x='214' y='245' fill='#cfe6da' font-size='12'>미끼</text>
    <!-- sync meter -->
    <rect x='430' y='150' width='170' height='18' rx='4' fill='#12324a'/>
    <rect x='430' y='150' width='128' height='18' rx='4' fill='#7fe0b0'/>
    <text x='430' y='142' fill='#9ad0b8' font-size='12'>밑밥 동조</text>
    <text x='605' y='164' fill='#ffce54' font-size='12' text-anchor='end'>75%</text>
  </svg>`}
];

let i = 0;
const art=document.getElementById('art'), cap=document.getElementById('cap'), dots=document.getElementById('dots');
function render(){
  const pg=PAGES[i];
  art.innerHTML=pg.svg;
  cap.innerHTML=`<h2>${i+1}. ${pg.h}</h2><p>${pg.p}</p><div class="tip">💡 ${pg.tip}</div>`;
  dots.innerHTML=PAGES.map((_,k)=>`<span class="dot ${k===i?'on':''}" onclick="jump(${k})"></span>`).join('');
  document.getElementById('prev').disabled=(i===0);
  document.getElementById('next').disabled=(i===PAGES.length-1);
}
function go(d){ i=Math.min(PAGES.length-1,Math.max(0,i+d)); render(); }
function jump(k){ i=k; render(); }
function hide(){ document.getElementById('modal').style.display='none'; }
function show(){ document.getElementById('modal').style.display='block'; i=0; render(); }
render();
</script>
</body>
</html>
